name: LDXP Stock Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read

concurrency:
  group: ldxp-stock-monitor
  cancel-in-progress: false

jobs:
  trigger-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Trigger Vercel monitor
        env:
          MONITOR_URL: ${{ secrets.LDXP_MONITOR_URL || 'https://buhuo-monitor.vercel.app/api/monitor' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET is not set"
            exit 1
          fi

          if [ -z "$MONITOR_URL" ]; then
            echo "::error::LDXP_MONITOR_URL is not set"
            exit 1
          fi

          curl --fail --silent --show-error \
            --retry 2 \
            --retry-all-errors \
            "$MONITOR_URL?secret=$CRON_SECRET"
