name: LDXP Stock Monitor

on:
  schedule:
    - cron: "*/6 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ldxp-stock-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run tests
        run: node --test scripts/monitor-ldxp-stock.test.mjs

      - name: Check Telegram secrets
        env:
          LDXP_TELEGRAM_BOT_TOKEN: ${{ secrets.LDXP_TELEGRAM_BOT_TOKEN }}
          LDXP_TELEGRAM_CHAT_ID: ${{ secrets.LDXP_TELEGRAM_CHAT_ID }}
        run: |
          missing=0
          for name in \
            LDXP_TELEGRAM_BOT_TOKEN \
            LDXP_TELEGRAM_CHAT_ID
          do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not set"
              missing=1
            fi
          done
          exit "$missing"

      - name: Run first stock check
        env:
          LDXP_TELEGRAM_BOT_TOKEN: ${{ secrets.LDXP_TELEGRAM_BOT_TOKEN }}
          LDXP_TELEGRAM_CHAT_ID: ${{ secrets.LDXP_TELEGRAM_CHAT_ID }}
          LDXP_TELEGRAM_THREAD_ID: ${{ secrets.LDXP_TELEGRAM_THREAD_ID }}
        run: |
          set -o pipefail
          node scripts/monitor-ldxp-stock.mjs --no-touch-unchanged | tee monitor-output-first.txt

      - name: Save first monitor state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/ldxp-stock-state.json
          if [ -f data/ldxp-stock-alerts.md ]; then
            git add data/ldxp-stock-alerts.md
          fi

          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update ldxp stock monitor state"
            git pull --rebase
            git push
          fi

      - name: Wait three minutes
        if: github.event_name == 'schedule'
        run: sleep 180

      - name: Run second stock check
        if: github.event_name == 'schedule'
        env:
          LDXP_TELEGRAM_BOT_TOKEN: ${{ secrets.LDXP_TELEGRAM_BOT_TOKEN }}
          LDXP_TELEGRAM_CHAT_ID: ${{ secrets.LDXP_TELEGRAM_CHAT_ID }}
          LDXP_TELEGRAM_THREAD_ID: ${{ secrets.LDXP_TELEGRAM_THREAD_ID }}
        run: |
          set -o pipefail
          node scripts/monitor-ldxp-stock.mjs --no-touch-unchanged | tee monitor-output-second.txt

      - name: Save second monitor state
        if: github.event_name == 'schedule'
        run: |
          git add data/ldxp-stock-state.json
          if [ -f data/ldxp-stock-alerts.md ]; then
            git add data/ldxp-stock-alerts.md
          fi

          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update ldxp stock monitor state"
            git pull --rebase
            git push
          fi
