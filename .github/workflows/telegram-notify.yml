name: Telegram Notify

on:
  workflow_dispatch:
    inputs:
      text:
        description: Telegram message text
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: telegram-delete-queue
  cancel-in-progress: false

jobs:
  send-message:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync latest main
        run: git pull --rebase origin main

      - name: Send Telegram notification
        id: send
        env:
          BOT_TOKEN: ${{ secrets.LDXP_TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.LDXP_TELEGRAM_CHAT_ID }}
          THREAD_ID: ${{ secrets.LDXP_TELEGRAM_THREAD_ID }}
          MESSAGE_TEXT: ${{ github.event.inputs.text }}
        run: |
          set -euo pipefail

          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "::error::Telegram bot token or chat ID is not set"
            exit 1
          fi

          text="${MESSAGE_TEXT:-}"
          if [ -z "$text" ]; then
            text="$(printf '%s\n' \
              '商品：ChatGPT Plus 月卡' \
              '库存：0 → 25' \
              '售价：¥19.90' \
              '商品链接：https://pay.ldxp.cn/shop/jisuai')"
          fi

          payload="$(jq -n \
            --arg chat_id "$CHAT_ID" \
            --arg text "$text" \
            '{
              chat_id: $chat_id,
              text: $text,
              disable_web_page_preview: true
            }')"

          if [ -n "$THREAD_ID" ]; then
            payload="$(echo "$payload" | jq --argjson thread_id "$THREAD_ID" \
              '. + {message_thread_id: $thread_id}')"
          fi

          response="$(curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Content-Type: application/json" \
            --data "$payload" \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage")"

          if [ "$(echo "$response" | jq -r '.ok')" != "true" ]; then
            echo "$response" | jq -r '"::error::Telegram: " + (.description // "request failed")'
            exit 1
          fi

          message_id="$(echo "$response" | jq -r '.result.message_id')"
          echo "message_id=$message_id" >> "$GITHUB_OUTPUT"
          echo "Telegram notification sent. message_id=$message_id"

      - name: Queue Telegram message deletion
        run: |
          node scripts/telegram-delete-queue.mjs \
            --enqueue \
            --chat-id "${{ secrets.LDXP_TELEGRAM_CHAT_ID }}" \
            --message-id "${{ steps.send.outputs.message_id }}" \
            --delete-after-seconds 18000

      - name: Commit delete queue
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/telegram-delete-queue.json

          if git diff --cached --quiet; then
            echo "No delete queue changes to commit."
          else
            git commit -m "chore: queue telegram message deletion [skip ci]"
            for attempt in 1 2 3 4 5; do
              git pull --rebase origin main
              git push && break
              if [ "$attempt" = "5" ]; then
                echo "::error::Failed to push queue changes after $attempt attempts"
                exit 1
              fi
              sleep 2
            done
          fi
