name: LDXP Stock Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: telegram-delete-queue
  cancel-in-progress: false

jobs:
  trigger-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync latest main
        run: git pull --rebase origin main

      - name: Trigger Vercel monitor
        env:
          MONITOR_URL: ${{ secrets.LDXP_MONITOR_URL || 'https://buhuo-monitor.vercel.app/api/monitor' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET is not set"
            exit 1
          fi

          if [ -z "$MONITOR_URL" ]; then
            echo "::error::LDXP_MONITOR_URL is not set"
            exit 1
          fi

          curl --fail --silent --show-error \
            --retry 2 \
            --retry-all-errors \
            "$MONITOR_URL?secret=$CRON_SECRET"

      - name: Delete expired Telegram notifications
        env:
          LDXP_TELEGRAM_BOT_TOKEN: ${{ secrets.LDXP_TELEGRAM_BOT_TOKEN }}
        run: node scripts/telegram-delete-queue.mjs

      - name: Commit delete queue changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -f data/telegram-delete-queue.json ]; then
            git add data/telegram-delete-queue.json
          fi

          if git diff --cached --quiet; then
            echo "No delete queue changes to commit."
          else
            git commit -m "chore: prune telegram delete queue [skip ci]"
            git pull --rebase origin main
            git push
          fi
