name: Telegram Delete Expired Messages

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: telegram-delete-queue
  cancel-in-progress: false

jobs:
  delete-expired-messages:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync latest main
        run: git pull --rebase origin main

      - name: Delete expired Telegram notifications
        env:
          LDXP_TELEGRAM_BOT_TOKEN: ${{ secrets.LDXP_TELEGRAM_BOT_TOKEN }}
        run: node scripts/telegram-delete-queue.mjs

      - name: Commit delete queue changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/telegram-delete-queue.json

          if git diff --cached --quiet; then
            echo "No delete queue changes to commit."
          else
            git commit -m "chore: prune telegram delete queue [skip ci]"
            git pull --rebase origin main
            git push
          fi
