# Include this file inside the existing HTTPS server block.
location = /stock-monitor {
    return 308 /stock-monitor/;
}

location = /stock-monitor/healthz {
    return 404;
}

location = /stock-monitor/api/v1/auth/login {
    client_max_body_size 2k;
    limit_req zone=ldxp_dashboard_login burst=3 nodelay;
    limit_req_status 429;
    proxy_pass http://127.0.0.1:8788/api/v1/auth/login;
    include /etc/nginx/snippets/ldxp-dashboard-proxy-headers.conf;
}

location = /stock-monitor/api/v1/inventory {
    client_max_body_size 1k;
    limit_req zone=ldxp_inventory_api burst=20 nodelay;
    limit_req_status 429;
    proxy_pass http://127.0.0.1:8788/api/v1/inventory;
    include /etc/nginx/snippets/ldxp-dashboard-proxy-headers.conf;
}

location ^~ /stock-monitor/ {
    client_max_body_size 2k;
    limit_req zone=ldxp_dashboard burst=30 nodelay;
    limit_req_status 429;
    proxy_pass http://127.0.0.1:8788/;
    include /etc/nginx/snippets/ldxp-dashboard-proxy-headers.conf;
}
