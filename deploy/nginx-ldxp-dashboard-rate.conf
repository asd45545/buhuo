# Install as /etc/nginx/conf.d/ldxp-dashboard-rate.conf. The conf.d directory
# must be included from nginx's http context.
limit_req_zone $binary_remote_addr zone=ldxp_dashboard:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=ldxp_dashboard_login:10m rate=6r/m;
limit_req_zone $binary_remote_addr zone=ldxp_inventory_api:10m rate=120r/m;
