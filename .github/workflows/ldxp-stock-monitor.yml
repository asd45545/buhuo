name: LDXP Stock Monitor

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ldxp-stock-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run tests
        run: node --test scripts/monitor-ldxp-stock.test.mjs

      - name: Check Telegram secrets
        env:
          LDXP_TELEGRAM_BOT_TOKEN: ${{ secrets.LDXP_TELEGRAM_BOT_TOKEN }}
          LDXP_TELEGRAM_CHAT_ID: ${{ secrets.LDXP_TELEGRAM_CHAT_ID }}
        run: |
          missing=0
          for name in \
            LDXP_TELEGRAM_BOT_TOKEN \
            LDXP_TELEGRAM_CHAT_ID
          do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not set"
              missing=1
            fi
          done
          exit "$missing"

      - name: Run stock check
        env:
          LDXP_TELEGRAM_BOT_TOKEN: ${{ secrets.LDXP_TELEGRAM_BOT_TOKEN }}
          LDXP_TELEGRAM_CHAT_ID: ${{ secrets.LDXP_TELEGRAM_CHAT_ID }}
          LDXP_TELEGRAM_THREAD_ID: ${{ secrets.LDXP_TELEGRAM_THREAD_ID }}
        run: |
          set -o pipefail
          set +e
          node scripts/monitor-ldxp-stock.mjs --no-touch-unchanged | tee monitor-output.txt
          status="${PIPESTATUS[0]}"
          set -e

          if [ "$status" -ne 0 ]; then
            if grep -Eq 'HTTP 520|returned non-JSON .*<html><script>var arg1=' monitor-output.txt; then
              echo "::warning::Shop API returned a temporary WAF/520 response. Skipping this check; the next scheduled run will retry."
              exit 0
            fi

            exit "$status"
          fi

      - name: Save monitor state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/ldxp-stock-state.json
          if [ -f data/ldxp-stock-alerts.md ]; then
            git add data/ldxp-stock-alerts.md
          fi

          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update ldxp stock monitor state"
            git pull --rebase
            git push
          fi
