name: Telegram Delete Expired Messages

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: telegram-delete-queue
  cancel-in-progress: false

jobs:
  delete-expired-messages:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync latest main
        run: git pull --rebase origin main

      - name: Delete expired Telegram notifications
        env:
          LDXP_TELEGRAM_BOT_TOKEN: ${{ secrets.LDXP_TELEGRAM_BOT_TOKEN }}
        run: node scripts/telegram-delete-queue.mjs

      - name: Commit delete queue changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/telegram-delete-queue.json

          if git diff --cached --quiet; then
            echo "No delete queue changes to commit."
          else
            git commit -m "chore: prune telegram delete queue [skip ci]"
            for attempt in 1 2 3 4 5; do
              git pull --rebase origin main
              git push && break
              if [ "$attempt" = "5" ]; then
                echo "::error::Failed to push queue changes after $attempt attempts"
                exit 1
              fi
              sleep 2
            done
          fi
